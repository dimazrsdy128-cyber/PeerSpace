<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Sesi — PeerSpace</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <style>
    .content-area { padding: 2rem 2.5rem; }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; color: #fff; margin: 0 0 .3rem; }
    .page-header h1 span { color: #8B2EFF; }
    .page-header p { color: rgba(255,255,255,.45); font-size: .9rem; margin: 0; }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1rem; margin-bottom: 1.8rem;
    }
    .summary-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 1.2rem;
      display: flex; flex-direction: column; gap: .4rem;
    }
    .summary-card .sc-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; margin-bottom: .2rem;
    }
    .sc-purple { background: rgba(139,46,255,.15); color: #8B2EFF; }
    .sc-green  { background: rgba(34,197,94,.12);  color: #22c55e; }
    .sc-yellow { background: rgba(245,158,11,.12); color: #f59e0b; }
    .sc-blue   { background: rgba(59,130,246,.12); color: #60a5fa; }
    .summary-card .sc-val { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .summary-card .sc-lbl { font-size: .78rem; color: rgba(255,255,255,.45); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: .8rem; flex-wrap: wrap; margin-bottom: 1.4rem;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap i {
      position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.35); font-size: 1.05rem;
    }
    .search-input {
      width: 100%; padding: .6rem .9rem .6rem 2.4rem;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: #fff; font-size: .88rem;
      transition: border-color .2s;
    }
    .search-input:focus { outline: none; border-color: #8B2EFF; }
    .search-input::placeholder { color: rgba(255,255,255,.3); }

    .filter-select {
      padding: .6rem 1rem;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: #fff; font-size: .88rem; cursor: pointer;
      transition: border-color .2s;
    }
    .filter-select:focus { outline: none; border-color: #8B2EFF; }
    .filter-select option { background: #1a0a2e; }

    .btn-export {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.25);
      color: #86efac; border-radius: 10px;
      padding: .6rem 1.1rem; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .btn-export:hover { background: rgba(34,197,94,.22); }

    /* ── Table wrapper ── */
    .table-wrap {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px; overflow: hidden;
    }
    .riwayat-table { width: 100%; border-collapse: collapse; }
    .riwayat-table thead tr {
      background: rgba(255,255,255,.05);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .riwayat-table th {
      padding: .85rem 1.1rem; text-align: left;
      font-size: .78rem; font-weight: 700;
      color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap;
    }
    .riwayat-table td {
      padding: .9rem 1.1rem;
      font-size: .88rem; color: rgba(255,255,255,.75);
      border-bottom: 1px solid rgba(255,255,255,.05);
      vertical-align: middle;
    }
    .riwayat-table tbody tr:last-child td { border-bottom: none; }
    .riwayat-table tbody tr {
      transition: background .15s;
    }
    .riwayat-table tbody tr:hover { background: rgba(255,255,255,.03); }

    /* Mahasiswa cell */
    .mhs-cell { display: flex; align-items: center; gap: .7rem; }
    .mhs-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; border: 1.5px solid rgba(139,46,255,.3);
    }
    .mhs-avatar-ph {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #8B2EFF, #5a00cc);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; color: #fff;
      border: 1.5px solid rgba(139,46,255,.3);
    }
    .mhs-name { font-weight: 600; color: #fff; font-size: .88rem; }
    .mhs-nim  { font-size: .74rem; color: rgba(255,255,255,.4); }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .22rem .75rem; border-radius: 20px;
      font-size: .74rem; font-weight: 600;
    }
    .status-selesai  { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.25);  color: #86efac; }
    .status-batal    { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.25);  color: #fca5a5; }
    .status-noshow   { background: rgba(245,158,11,.1);  border: 1px solid rgba(245,158,11,.25); color: #fde68a; }

    /* Rating stars */
    .stars { color: #f59e0b; font-size: .9rem; letter-spacing: .05em; }
    .stars-empty { color: rgba(255,255,255,.2); }

    /* Action btn */
    .btn-detail {
      background: rgba(139,46,255,.15); border: 1px solid rgba(139,46,255,.25);
      color: #b86fff; border-radius: 8px; padding: .3rem .75rem;
      font-size: .78rem; cursor: pointer; transition: background .18s;
      white-space: nowrap;
    }
    .btn-detail:hover { background: rgba(139,46,255,.3); }

    /* ── Skeleton ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,.06) 25%, rgba(255,255,255,.11) 50%, rgba(255,255,255,.06) 75%);
      background-size: 400px 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    .sk-line { height: 11px; }
    .sk-circle { border-radius: 50%; }

    /* ── Empty / Error ── */
    .empty-state, .error-state {
      text-align: center; padding: 3.5rem 2rem; color: rgba(255,255,255,.4);
    }
    .empty-state i { font-size: 3rem; color: rgba(139,46,255,.4); display: block; margin-bottom: .8rem; }
    .error-state i  { font-size: 3rem; color: #ef4444; display: block; margin-bottom: .8rem; }
    .retry-btn {
      margin-top: .7rem; background: rgba(139,46,255,.2);
      border: 1px solid rgba(139,46,255,.4); color: #b86fff;
      padding: .45rem 1.1rem; border-radius: 8px; cursor: pointer; font-size: .85rem;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.2rem; border-top: 1px solid rgba(255,255,255,.07);
      flex-wrap: wrap; gap: .8rem;
    }
    .page-info { font-size: .82rem; color: rgba(255,255,255,.4); }
    .page-btns { display: flex; gap: .4rem; }
    .page-btn {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); border-radius: 8px;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .85rem; transition: all .18s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(139,46,255,.2); border-color: rgba(139,46,255,.4); color: #b86fff; }
    .page-btn.active { background: rgba(139,46,255,.3); border-color: rgba(139,46,255,.5); color: #fff; font-weight: 700; }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Modal detail ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; visibility: hidden; transition: opacity .25s, visibility .25s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-box {
      background: #130820; border: 1px solid rgba(139,46,255,.3);
      border-radius: 18px; padding: 0; width: 100%; max-width: 520px; margin: 1rem;
      transform: scale(.96); transition: transform .25s; overflow: hidden;
    }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-header {
      padding: 1.4rem 1.6rem; border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; color: #fff; margin: 0; }
    .modal-close {
      background: none; border: none; color: rgba(255,255,255,.45);
      font-size: 1.3rem; cursor: pointer; transition: color .18s; padding: 0;
    }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 1.5rem 1.6rem; }

    .detail-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 1rem; padding: .65rem 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: .82rem; color: rgba(255,255,255,.45); flex-shrink: 0; }
    .detail-value { font-size: .88rem; color: #fff; font-weight: 500; text-align: right; }

    .catatan-box {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 1rem; margin-top: 1rem;
    }
    .catatan-box label {
      display: block; font-size: .78rem; color: rgba(255,255,255,.45); margin-bottom: .5rem;
    }
    .catatan-textarea {
      width: 100%; background: none; border: none; color: rgba(255,255,255,.75);
      font-size: .87rem; font-family: inherit; resize: none; outline: none;
      line-height: 1.7; box-sizing: border-box;
    }
    .btn-save-catatan {
      margin-top: .8rem;
      background: linear-gradient(135deg, #8B2EFF, #6d00e8);
      border: none; color: #fff; border-radius: 9px;
      padding: .5rem 1.2rem; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-save-catatan:disabled { opacity: .45; cursor: not-allowed; }

    @media (max-width: 900px) {
      .content-area { padding: 1.2rem; }
      .riwayat-table th:nth-child(4),
      .riwayat-table td:nth-child(4) { display: none; }
    }
    @media (max-width: 640px) {
      .riwayat-table th:nth-child(3),
      .riwayat-table td:nth-child(3),
      .riwayat-table th:nth-child(5),
      .riwayat-table td:nth-child(5) { display: none; }
    }
  </style>
</head>

<script type="module">
import { supabase } from '../assets/js/supabase-client.js'

// ── Auth guard (konselor only) ──
const { data: { user } } = await supabase.auth.getUser()
if (!user) { window.location.href = '../auth/login.html'; throw new Error() }

const { data: profile } = await supabase
  .from('profiles').select('nama, role, avatar_url').eq('id', user.id).single()
if (profile?.role !== 'konselor') { window.location.href = '../auth/login.html'; throw new Error() }

// ── Load sidebar ──
fetch('../shared/sidebar-konselor.html').then(r => r.text()).then(html => {
  document.getElementById('sidebar-container').innerHTML = html
  document.querySelectorAll('#sidebar-container .menu-link').forEach(a => {
    if (a.getAttribute('href') === 'riwayat.html') a.closest('.menu-item')?.classList.add('active')
  })
  const btnLogout = document.getElementById('btnLogout')
  if (btnLogout) btnLogout.addEventListener('click', async (e) => {
    e.preventDefault()
    await supabase.auth.signOut({ scope: 'local' })
    Object.keys(localStorage).filter(k => k.startsWith('sb-')).forEach(k => localStorage.removeItem(k))
    window.location.href = '../auth/login.html'
  })
})

// ── Load navbar ──
fetch('../shared/navbar.html').then(r => r.text()).then(html => {
  const container = document.getElementById('navbar-container')
  container.innerHTML = html
  const el = s => container.querySelector(s)
  if (el('#topbarTitle')) el('#topbarTitle').textContent = 'Riwayat Sesi'
  if (el('#navUserName')) el('#navUserName').textContent = profile.nama || user.email
  if (el('#navUserRole')) el('#navUserRole').textContent = 'Konselor'
  if (el('#navAvatar'))   el('#navAvatar').src = profile.avatar_url
    || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.nama || 'U')}&background=8B2EFF&color=fff`
  const logoutBtn = el('#btnLogout')
  if (logoutBtn) logoutBtn.addEventListener('click', async () => {
    await supabase.auth.signOut({ scope: 'local' })
    window.location.href = '../auth/login.html'
  })
})

// ── Get konselor ID ──
const { data: konselorData } = await supabase
  .from('konselor').select('id').eq('user_id', user.id).single()
const konselorId = konselorData?.id
if (!konselorId) {
  document.querySelector('.content-area').innerHTML =
    `<div class="error-state"><i class='bx bx-error-circle'></i><p>Data konselor tidak ditemukan.</p></div>`
  throw new Error()
}

// ── State ──
const PAGE_SIZE = 10
let currentPage = 1
let allData = []
let filtered = []

// ── Helpers ──
function formatDate (iso) {
  if (!iso) return '—'
  return new Date(iso).toLocaleDateString('id-ID', {
    weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
  })
}
function starsHtml (rating) {
  if (!rating) return `<span style="color:rgba(255,255,255,.3);font-size:.8rem">Belum dinilai</span>`
  const full  = Math.floor(rating)
  const empty = 5 - full
  return `<span class="stars">${'★'.repeat(full)}<span class="stars-empty">${'★'.repeat(empty)}</span></span>
          <span style="font-size:.78rem;color:rgba(255,255,255,.5);margin-left:.2rem">${parseFloat(rating).toFixed(1)}</span>`
}
function statusBadge (status) {
  const map = {
    done:      ['status-selesai', 'bx-check-circle', 'Selesai'],
    cancelled: ['status-batal',   'bx-x-circle',     'Dibatalkan'],
    rejected:  ['status-noshow',  'bx-block',        'Ditolak'],
  }
  const [cls, icon, label] = map[status] || ['status-batal', 'bx-minus', status]
  return `<span class="status-badge ${cls}"><i class='bx ${icon}'></i>${label}</span>`
}
function avatarHtml (p) {
  const name = p?.nama || 'M'
  const ini  = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
  if (p?.avatar_url)
    return `<img class="mhs-avatar" src="${p.avatar_url}" alt="${name}" />`
  return `<div class="mhs-avatar-ph">${ini}</div>`
}

// ── Fetch ──
async function fetchRiwayat () {
  try {
    // Step 1: Ambil data booking beserta profil mahasiswa
    const { data: bookings, error } = await supabase
      .from('booking')
      .select(`
        id, tanggal, sesi, keluhan, status, catatan_konselor, created_at,
        profiles!booking_mahasiswa_id_fkey ( nama, avatar_url, nim_nip )
      `)
      .eq('konselor_id', konselorId)
      .in('status', ['done', 'cancelled', 'rejected'])
      .order('tanggal', { ascending: false })

    if (error) throw error

    const bookingList = bookings || []

    // Step 2: Ambil semua reviews untuk konselor ini secara terpisah
    // (lebih reliable daripada join otomatis yang bergantung pada nama FK)
    let reviewsMap = {}
    if (bookingList.length > 0) {
      const bookingIds = bookingList.map(b => b.id)
      const { data: reviews, error: revErr } = await supabase
        .from('reviews')
        .select('booking_id, rating, komentar')
        .in('booking_id', bookingIds)

      if (revErr) console.warn('Gagal fetch reviews:', revErr.message)
      else {
        // Map booking_id → review
        ;(reviews || []).forEach(r => { reviewsMap[r.booking_id] = r })
      }
    }

    // Step 3: Merge reviews ke dalam data booking
    allData = bookingList.map(b => ({
      ...b,
      reviews: reviewsMap[b.id] ? [reviewsMap[b.id]] : []
    }))

    buildMonthFilter()
    renderSummary()
    applyFilter()
  } catch (err) {
    console.error(err)
    document.getElementById('tableBody').innerHTML = `
      <tr><td colspan="6">
        <div class="error-state">
          <i class='bx bx-error-circle'></i>
          <p>Gagal memuat riwayat sesi.</p>
          <button class="retry-btn" onclick="location.reload()">Coba Lagi</button>
        </div>
      </td></tr>`
  }
}

// ── Build month filter ──
function buildMonthFilter () {
  const months = [...new Set(allData.map(b => {
    if (!b.tanggal) return null
    const d = new Date(b.tanggal)
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
  }).filter(Boolean))].sort().reverse()

  const sel = document.getElementById('filterBulan')
  months.forEach(m => {
    const [y, mo] = m.split('-')
    const label = new Date(y, mo-1).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' })
    const opt = document.createElement('option')
    opt.value = m; opt.textContent = label
    sel.appendChild(opt)
  })
}

// ── Summary ──
function renderSummary () {
  const total    = allData.length
  const selesai  = allData.filter(b => b.status === 'done').length
  const ratings  = allData.flatMap(b => b.reviews || []).map(r => r.rating).filter(Boolean)
  const avgRating = ratings.length
    ? (ratings.reduce((a,b) => a+b, 0) / ratings.length).toFixed(1)
    : '—'
  const bulanIni = allData.filter(b => {
    if (!b.tanggal) return false
    const d = new Date(b.tanggal)
    const now = new Date()
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()
  }).length

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card">
      <div class="sc-icon sc-purple"><i class='bx bx-list-check'></i></div>
      <span class="sc-val">${total}</span>
      <span class="sc-lbl">Total Riwayat</span>
    </div>
    <div class="summary-card">
      <div class="sc-icon sc-green"><i class='bx bx-check-circle'></i></div>
      <span class="sc-val">${selesai}</span>
      <span class="sc-lbl">Sesi Selesai</span>
    </div>
    <div class="summary-card">
      <div class="sc-icon sc-yellow"><i class='bx bxs-star'></i></div>
      <span class="sc-val">${avgRating}</span>
      <span class="sc-lbl">Rata-rata Rating</span>
    </div>
    <div class="summary-card">
      <div class="sc-icon sc-blue"><i class='bx bx-calendar'></i></div>
      <span class="sc-val">${bulanIni}</span>
      <span class="sc-lbl">Bulan Ini</span>
    </div>`
}

// ── Filter & render ──
function applyFilter () {
  const q      = document.getElementById('searchInput').value.toLowerCase().trim()
  const status = document.getElementById('filterStatus').value
  const bulan  = document.getElementById('filterBulan').value

  filtered = allData.filter(b => {
    const name = (b.profiles?.nama || '').toLowerCase()
    const nim  = (b.profiles?.nim_nip || '').toLowerCase()
    const matchSearch = !q || name.includes(q) || nim.includes(q)
    const matchStatus = !status || b.status === status
    const matchBulan  = !bulan || (b.tanggal || '').startsWith(bulan)
    return matchSearch && matchStatus && matchBulan
  })

  currentPage = 1
  renderTable()
}

function renderTable () {
  const tbody   = document.getElementById('tableBody')
  const pagDiv  = document.getElementById('pagination')
  const start   = (currentPage - 1) * PAGE_SIZE
  const pageData = filtered.slice(start, start + PAGE_SIZE)

  if (!filtered.length) {
    tbody.innerHTML = `
      <tr><td colspan="6">
        <div class="empty-state">
          <i class='bx bx-folder-open'></i>
          <p>Tidak ada riwayat yang sesuai.</p>
        </div>
      </td></tr>`
    pagDiv.style.display = 'none'
    return
  }

  tbody.innerHTML = pageData.map(b => {
    const rating = b.reviews?.[0]?.rating ?? null
    return `
    <tr>
      <td>
        <div class="mhs-cell">
          ${avatarHtml(b.profiles)}
          <div>
            <div class="mhs-name">${b.profiles?.nama || '—'}</div>
            <div class="mhs-nim">${b.profiles?.nim_nip || ''}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="font-weight:600;color:#fff">${formatDate(b.tanggal)}</div>
        <div style="font-size:.76rem;color:rgba(255,255,255,.4)">${b.sesi || ''}</div>
      </td>
      <td>${b.sesi || '—'}</td>
      <td>${starsHtml(rating)}</td>
      <td>${statusBadge(b.status)}</td>
      <td>
        <button class="btn-detail" onclick="openDetail('${b.id}')">
          <i class='bx bx-show'></i> Detail
        </button>
      </td>
    </tr>`
  }).join('')

  // Pagination
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE)
  if (totalPages <= 1) { pagDiv.style.display = 'none'; return }

  pagDiv.style.display = 'flex'
  const from = start + 1
  const to   = Math.min(start + PAGE_SIZE, filtered.length)
  pagDiv.innerHTML = `
    <span class="page-info">Menampilkan ${from}–${to} dari ${filtered.length}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
        <i class='bx bx-chevron-left'></i>
      </button>
      ${Array.from({length: Math.min(totalPages, 5)}, (_,i) => {
        const p = i + Math.max(1, currentPage - 2)
        if (p > totalPages) return ''
        return `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
      }).join('')}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>
        <i class='bx bx-chevron-right'></i>
      </button>
    </div>`
}

window.goPage = (p) => {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE)
  if (p < 1 || p > totalPages) return
  currentPage = p
  renderTable()
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

// ── Modal detail ──
window.openDetail = (bookingId) => {
  const b = allData.find(x => x.id === bookingId)
  if (!b) return

  const review = b.reviews?.[0]
  const modal  = document.getElementById('modalDetail')
  const body   = document.getElementById('modalBody')

  body.innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Mahasiswa</span>
      <span class="detail-value">${b.profiles?.nama || '—'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">NIM</span>
      <span class="detail-value">${b.profiles?.nim_nip || '—'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Tanggal</span>
      <span class="detail-value">${formatDate(b.tanggal)}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Sesi</span>
      <span class="detail-value">${b.sesi || '—'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Keluhan</span>
      <span class="detail-value" style="text-align:right;max-width:280px">${b.keluhan || '—'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value">${statusBadge(b.status)}</span>
    </div>
    ${review ? `
    <div class="detail-row">
      <span class="detail-label">Rating</span>
      <span class="detail-value">${starsHtml(review.rating)}</span>
    </div>
    ${review.komentar ? `
    <div class="detail-row" style="flex-direction:column;gap:.4rem">
      <span class="detail-label">Ulasan Mahasiswa</span>
      <span class="detail-value" style="text-align:left;color:rgba(255,255,255,.65);font-style:italic">
        "${review.komentar}"
      </span>
    </div>` : ''}` : ''}
    <div class="catatan-box">
      <label><i class='bx bx-note'></i> Catatan Konselor (pribadi)</label>
      <textarea class="catatan-textarea" id="catatanInput" rows="4"
        placeholder="Tambahkan catatan sesi ini...">${b.catatan_konselor || ''}</textarea>
      <button class="btn-save-catatan" id="btnSaveCatatan" onclick="saveCatatan('${b.id}')">
        <i class='bx bx-save'></i> Simpan Catatan
      </button>
    </div>`

  modal.classList.add('open')
}

window.saveCatatan = async (bookingId) => {
  const btn     = document.getElementById('btnSaveCatatan')
  const catatan = document.getElementById('catatanInput').value.trim()
  btn.disabled  = true
  btn.innerHTML = `<i class='bx bx-loader-alt bx-spin'></i> Menyimpan...`

  try {
    const { error } = await supabase
      .from('booking')
      .update({ catatan_konselor: catatan })
      .eq('id', bookingId)

    if (error) throw error

    const idx = allData.findIndex(b => b.id === bookingId)
    if (idx !== -1) allData[idx].catatan_konselor = catatan

    btn.innerHTML = `<i class='bx bx-check'></i> Tersimpan!`
    setTimeout(() => { btn.innerHTML = `<i class='bx bx-save'></i> Simpan Catatan`; btn.disabled = false }, 2000)
  } catch (err) {
    alert('Gagal menyimpan catatan: ' + (err.message || 'Coba lagi'))
    btn.disabled = false
    btn.innerHTML = `<i class='bx bx-save'></i> Simpan Catatan`
  }
}

document.getElementById('btnCloseModal').addEventListener('click', () => {
  document.getElementById('modalDetail').classList.remove('open')
})
document.getElementById('modalDetail').addEventListener('click', e => {
  if (e.target === document.getElementById('modalDetail'))
    document.getElementById('modalDetail').classList.remove('open')
})

// ── Export CSV ──
document.getElementById('btnExport').addEventListener('click', () => {
  if (!filtered.length) { alert('Tidak ada data untuk diekspor.'); return }

  const header = ['Nama Mahasiswa','NIM','Tanggal','Sesi','Keluhan','Status','Rating','Ulasan']
  const rows = filtered.map(b => [
    b.profiles?.nama || '',
    b.profiles?.nim_nip || '',
    b.tanggal || '',
    b.sesi || '',
    (b.keluhan || '').replace(/,/g, ';'),
    b.status || '',
    b.reviews?.[0]?.rating || '',
    (b.reviews?.[0]?.komentar || '').replace(/,/g, ';'),
  ])

  const csv = [header, ...rows].map(r => r.join(',')).join('\n')
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
  const url  = URL.createObjectURL(blob)
  const a    = document.createElement('a')
  a.href = url
  a.download = `riwayat-sesi-${new Date().toISOString().slice(0,10)}.csv`
  a.click()
  URL.revokeObjectURL(url)
})

// ── Event listeners ──
let debounce
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debounce)
  debounce = setTimeout(applyFilter, 300)
})
document.getElementById('filterStatus').addEventListener('change', applyFilter)
document.getElementById('filterBulan').addEventListener('change', applyFilter)

// ── Init ──
fetchRiwayat()
</script>
</body>
