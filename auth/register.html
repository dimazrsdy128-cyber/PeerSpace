<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - PeerSpace</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .auth-header { margin-bottom: 30px; }
        .auth-header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .auth-header p { color: var(--text-secondary); font-size: 0.95rem; }
        .auth-links {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: color 0.3s;
        }
        .auth-links a:hover { color: var(--accent-hover); }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            margin-bottom: 16px;
            text-align: left;
            display: none;
        }
        .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
        .alert-success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #4ade80; }

        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .brand { font-weight: 800; font-size: 1.4rem; color: var(--accent-purple); margin-bottom: 24px; display: block; }

        .password-hint { font-size: 0.78rem; color: var(--text-secondary); text-align: left; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">

            <span class="brand">Konselerin.</span>

            <div class="auth-header">
                <h1>Daftar Akun</h1>
                <p>Bergabung dengan ruang aman mahasiswa Polimedia.</p>
            </div>

            <div id="errorMsg"   class="alert alert-error"></div>
            <div id="successMsg" class="alert alert-success"></div>

            <div class="form-group" style="text-align: left;">
                <label for="nama">Nama Lengkap / Nama Samaran</label>
                <input type="text" id="nama" class="form-control" placeholder="Contoh: Anonim_42" required>
            </div>

            <div class="form-group" style="text-align: left;">
                <label for="nim">NIM / Email Kampus</label>
                <input type="text" id="nim" class="form-control" placeholder="Masukkan NIM atau Email" required>
            </div>

            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Buat password" required>
                <p class="password-hint">Minimal 6 karakter</p>
            </div>

            <div class="form-group" style="text-align: left;">
                <label for="confirm_password">Konfirmasi Password</label>
                <input type="password" id="confirm_password" class="form-control" placeholder="Ulangi password" required>
            </div>

            <button id="btnRegister" class="btn-primary" onclick="handleRegister()">Daftar Sekarang</button>

            <div class="auth-links">
                <span style="color: var(--text-secondary);">Sudah punya akun?</span>
                <a href="login.html">Masuk di sini</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient(
            'https://bsurzilwkafbqibrumcf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzdXJ6aWx3a2FmYnFpYnJ1bWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjIxNzUsImV4cCI6MjA5NTI5ODE3NX0.47jGgbsAMq60QaGMgMbW8RqapeIImePH9ditsdNLFHs'
        )

        window.handleRegister = async function () {
            const btn     = document.getElementById('btnRegister')
            const errEl   = document.getElementById('errorMsg')
            const succEl  = document.getElementById('successMsg')
            const nama    = document.getElementById('nama').value.trim()
            const nim     = document.getElementById('nim').value.trim()
            const pass    = document.getElementById('password').value
            const confirm = document.getElementById('confirm_password').value

            // Reset pesan
            errEl.style.display  = 'none'
            succEl.style.display = 'none'

            // Validasi
            if (!nama || !nim || !pass || !confirm) {
                errEl.textContent   = 'Semua field wajib diisi.'
                errEl.style.display = 'block'
                return
            }
            if (pass !== confirm) {
                errEl.textContent   = 'Password dan konfirmasi password tidak cocok.'
                errEl.style.display = 'block'
                return
            }
            if (pass.length < 6) {
                errEl.textContent   = 'Password minimal 6 karakter.'
                errEl.style.display = 'block'
                return
            }

            btn.textContent = 'Mendaftarkan...'
            btn.disabled    = true

            try {
                // Jika bukan email, tambah domain
                const email = nim.includes('@') ? nim : `${nim}@konselerin.ac.id`

                const { data, error } = await supabase.auth.signUp({
                    email,
                    password: pass,
                    options: {
                        data: { nama, role: 'mahasiswa', nim_nip: nim }
                    }
                })
                if (error) throw error

                // Insert ke profiles (jika trigger belum jalan otomatis)
                if (data.user) {
                    await supabase.from('profiles').upsert({
                        id:      data.user.id,
                        nama,
                        email,
                        role:    'mahasiswa',
                        nim_nip: nim,
                    })
                }

                succEl.textContent   = '✓ Pendaftaran berhasil! Mengalihkan ke halaman login...'
                succEl.style.display = 'block'
                document.querySelectorAll('input').forEach(el => el.value = '')

                setTimeout(() => window.location.href = 'login.html', 2500)

            } catch (err) {
                let msg = 'Pendaftaran gagal. Silakan coba lagi.'
                if (err.message.includes('already registered') || err.message.includes('already been registered')) {
                    msg = 'NIM/email sudah terdaftar. Silakan login.'
                } else if (err.message.includes('invalid')) {
                    msg = 'Format email/NIM tidak valid.'
                } else {
                    msg = 'Pendaftaran gagal: ' + err.message
                }
                errEl.textContent   = msg
                errEl.style.display = 'block'
                btn.textContent     = 'Daftar Sekarang'
                btn.disabled        = false
            }
        }
    </script>
</body>
</html>
