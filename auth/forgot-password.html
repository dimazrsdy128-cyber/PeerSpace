<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Konselor Sebaya</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-header { margin-bottom: 30px; }
        .auth-header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .auth-header p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; }
        .auth-links {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .auth-links a:hover { color: var(--accent-purple); }
    </style>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Lupa Password?</h1>
                <p>Tenang aja, masukkan email kampus kamu di bawah dan kami akan kirimkan link untuk reset password.</p>
            </div>

            <form id="resetForm">
                <div class="form-group" style="text-align: left;">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Masukkan email kamu" required>
                </div>

                <button type="submit" class="btn-primary">Kirim Link Reset</button>
            </form>

            <div class="auth-links">
                <a href="login.html"><i class='bx bx-arrow-back'></i> Kembali ke halaman Login</a>
            </div>
        </div>
    </div>

    <script>
         import { Auth } from '../assets/js/supabase-client.js'
 
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const btn    = document.getElementById('btnReset')
            const errEl  = document.getElementById('errorMsg')
            const succEl = document.getElementById('successMsg')
            const email  = document.getElementById('email').value.trim()
 
            errEl.style.display  = 'none'
            succEl.style.display = 'none'
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Mengirim..."
            btn.disabled  = true
 
            try {
                await Auth.forgotPassword(email)
                succEl.textContent = 'Link reset password telah dikirim ke email kamu! Silakan cek inbox atau folder spam.'
                succEl.style.display = 'block'
                document.getElementById('resetForm').reset()
            } catch (err) {
                errEl.textContent = 'Gagal mengirim email: ' + err.message
                errEl.style.display = 'block'
            } finally {
                btn.innerHTML = 'Kirim Link Reset'
                btn.disabled  = false
            }
        })
    </script>
</body>
</html>
