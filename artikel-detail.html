<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel — PeerSpace</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    :root {
      --accent: #8B2EFF;
      --accent-soft: rgba(139,46,255,.12);
      --bg-p: var(--bg-primary, #0f0f1a);
      --bg-s: var(--bg-secondary, #16162a);
      --tx-p: var(--text-primary, #e2e2f0);
      --tx-m: var(--text-muted, #888);
      --radius: 16px;
    }
    * { box-sizing: border-box; }

    .detail-page {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 28px 64px;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--tx-m); font-size: .85rem; font-family: 'DM Sans', sans-serif;
      text-decoration: none; margin-bottom: 28px;
      transition: color .18s;
    }
    .back-link:hover { color: #a855f7; }
    .back-link i { font-size: 1.1rem; }

    /* ── Category tag ── */
    .article-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-soft); border: 1px solid rgba(139,46,255,.3);
      color: #a855f7; padding: 4px 12px; border-radius: 99px;
      font-size: .75rem; font-weight: 600; letter-spacing: .05em;
      text-transform: uppercase; margin-bottom: 18px;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Title ── */
    .article-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      color: var(--tx-p); line-height: 1.25;
      margin: 0 0 20px;
    }

    /* ── Author row ── */
    .author-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .author-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-soft); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 700; color: #a855f7;
      border: 2px solid rgba(139,46,255,.25);
    }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-info { flex: 1; }
    .author-name {
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 600; color: var(--tx-p);
    }
    .author-meta {
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem; color: var(--tx-m);
      display: flex; gap: 14px; margin-top: 2px; flex-wrap: wrap;
    }
    .author-meta span { display: flex; align-items: center; gap: 4px; }
    .author-meta i { font-size: .85rem; }

    /* ── Cover image ── */
    .cover-wrap {
      width: 100%; border-radius: 16px; overflow: hidden;
      margin-bottom: 36px; background: rgba(139,46,255,.08);
      border: 1px solid rgba(139,46,255,.12);
      aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
    }
    .cover-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .cover-placeholder { color: rgba(139,46,255,.3); font-size: 3.5rem; }

    /* ── Article body ── */
    .article-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; line-height: 1.85;
      color: rgba(226,226,240,.85);
    }
    .article-body h1,
    .article-body h2,
    .article-body h3 {
      font-family: 'DM Serif Display', serif;
      color: var(--tx-p); margin: 2em 0 .6em; line-height: 1.3;
    }
    .article-body h1 { font-size: 1.7rem; }
    .article-body h2 { font-size: 1.35rem; }
    .article-body h3 { font-size: 1.1rem; }
    .article-body p { margin: 0 0 1.2em; }
    .article-body ul, .article-body ol {
      padding-left: 1.5em; margin: 0 0 1.2em;
    }
    .article-body li { margin-bottom: .4em; }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5em 0; padding: .8em 1.2em;
      background: var(--accent-soft); border-radius: 0 10px 10px 0;
      color: rgba(226,226,240,.7); font-style: italic;
    }
    .article-body img {
      max-width: 100%; border-radius: 10px; margin: 1em 0;
    }
    .article-body a { color: #a855f7; text-decoration: underline; }
    .article-body code {
      background: rgba(255,255,255,.07); border-radius: 4px;
      padding: 2px 6px; font-size: .88em;
    }
    .article-body pre {
      background: rgba(255,255,255,.05); border-radius: 10px;
      padding: 16px; overflow-x: auto; margin: 1.2em 0;
    }
    .article-body pre code { background: none; padding: 0; }

    /* ── Tags footer ── */
    .tags-footer {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 40px; padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .tag-chip {
      background: var(--accent-soft); border: 1px solid rgba(139,46,255,.2);
      color: #a855f7; padding: 4px 12px; border-radius: 99px;
      font-size: .78rem; font-weight: 500; font-family: 'DM Sans', sans-serif;
    }

    /* ── Skeleton ── */
    .skel { background: rgba(255,255,255,.06); border-radius: 8px; animation: shimmer 1.6s infinite; }
    @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.85} }

    /* ── Error / Not found ── */
    .error-state {
      text-align: center; padding: 80px 20px; color: var(--tx-m);
    }
    .error-state i { font-size: 3rem; color: rgba(139,46,255,.3); display: block; margin-bottom: 14px; }
    .error-state h2 { font-family: 'DM Serif Display', serif; color: var(--tx-p); margin: 0 0 8px; }
    .error-state p { font-family: 'DM Sans', sans-serif; font-size: .92rem; margin: 0 0 20px; }
    .btn-back-home {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff; border: none;
      padding: 10px 22px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: opacity .18s;
    }
    .btn-back-home:hover { opacity: .85; }

    @media(max-width:640px) {
      .detail-page { padding: 24px 16px 48px; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar-container"></aside>

  <div class="main-content">
    <header class="topbar" id="navbar-container"></header>

    <div class="content-wrapper">
      <div class="detail-page" id="detailPage">
        <!-- Skeleton awal -->
        <div class="skel" style="height:14px;width:120px;margin-bottom:32px"></div>
        <div class="skel" style="height:12px;width:80px;border-radius:99px;margin-bottom:18px"></div>
        <div class="skel" style="height:36px;width:90%;margin-bottom:8px"></div>
        <div class="skel" style="height:36px;width:65%;margin-bottom:24px"></div>
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:28px">
          <div class="skel" style="width:42px;height:42px;border-radius:50%;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <div class="skel" style="height:13px;width:140px"></div>
            <div class="skel" style="height:11px;width:200px"></div>
          </div>
        </div>
        <div class="skel" style="width:100%;aspect-ratio:16/9;border-radius:16px;margin-bottom:36px"></div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="skel" style="height:13px;width:100%"></div>
          <div class="skel" style="height:13px;width:90%"></div>
          <div class="skel" style="height:13px;width:95%"></div>
          <div class="skel" style="height:13px;width:80%"></div>
          <div class="skel" style="height:13px;width:85%"></div>
          <div class="skel" style="height:13px;width:70%"></div>
          <div class="skel" style="height:13px;width:92%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { supabase } from '../assets/js/supabase-client.js'

  // ── Auth ──
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) { window.location.href = '../auth/login.html'; throw new Error() }

  // ── Shared UI ──
  fetch('../shared/sidebar.html').then(r => r.text()).then(html => {
    document.getElementById('sidebar-container').innerHTML = html
  }).catch(() => {})

  fetch('../shared/navbar.html').then(r => r.text()).then(async html => {
    const container = document.getElementById('navbar-container')
    container.innerHTML = html
    const titleEl = container.querySelector('#topbarTitle')
    if (titleEl) titleEl.textContent = 'Artikel'
    const { data: profile } = await supabase.from('profiles').select('nama,role,avatar_url').eq('id', user.id).single()
    if (profile) {
      const nameEl = container.querySelector('#navUserName')
      const roleEl = container.querySelector('#navUserRole')
      const avatarEl = container.querySelector('#navAvatar')
      if (nameEl) nameEl.textContent = profile.nama || user.email
      if (roleEl) roleEl.textContent = { mahasiswa:'Mahasiswa', konselor:'Konselor', admin:'Admin' }[profile.role] || profile.role
      if (avatarEl) avatarEl.src = profile.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.nama||'U')}&background=8B2EFF&color=fff`
    }
    const logoutBtn = container.querySelector('#btnLogout')
    if (logoutBtn) logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut({ scope: 'local' })
      window.location.href = '../auth/login.html'
    })
  }).catch(() => {})

  // ── Helpers ──
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
  }
  function fmtViews(n) {
    return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n || 0)
  }
  function readTime(html) {
    const words = (html || '').replace(/<[^>]+>/g,'').split(/\s+/).filter(Boolean).length
    return Math.max(1, Math.round(words / 200)) + ' menit baca'
  }

  function renderError(msg = 'Artikel tidak ditemukan.') {
    document.getElementById('detailPage').innerHTML = `
      <div class="error-state">
        <i class='bx bx-book-open'></i>
        <h2>Oops!</h2>
        <p>${escHtml(msg)}</p>
        <a href="artikel.html" class="btn-back-home"><i class='bx bx-arrow-back'></i> Kembali ke Artikel</a>
      </div>`
  }

  // ── Get article ID from URL ──
  const params = new URLSearchParams(location.search)
  const articleId = params.get('id')
  if (!articleId) { renderError('ID artikel tidak valid.'); throw new Error() }

  // ── Fetch article ──
  const { data: art, error } = await supabase
    .from('articles')
    .select(`
      id, judul, konten, cover_url, tags, views, created_at, status,
      author:author_id ( id, nama, avatar_url )
    `)
    .eq('id', articleId)
    .eq('status', 'published')
    .single()

  if (error || !art) {
    renderError('Artikel tidak ditemukan atau belum dipublikasikan.')
    throw new Error()
  }

  // ── Increment views (fire and forget) ──
  supabase.from('articles').update({ views: (art.views || 0) + 1 }).eq('id', articleId)

  // ── Render ──
  const author = art.author || {}
  const authorName = author.nama || 'Konselor'
  const initials = authorName.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
  const firstTag = art.tags?.[0] || ''
  const tags = art.tags || []

  document.title = `${art.judul} — PeerSpace`

  document.getElementById('detailPage').innerHTML = `
    <a href="artikel.html" class="back-link">
      <i class='bx bx-arrow-back'></i> Kembali ke Artikel
    </a>

    ${firstTag ? `<div class="article-tag"><i class='bx bx-purchase-tag'></i>${escHtml(firstTag)}</div>` : ''}

    <h1 class="article-title">${escHtml(art.judul)}</h1>

    <div class="author-row">
      <div class="author-avatar">
        ${author.avatar_url
          ? `<img src="${escHtml(author.avatar_url)}" alt="${escHtml(authorName)}"
               onerror="this.parentElement.textContent='${escHtml(initials)}'">`
          : escHtml(initials)}
      </div>
      <div class="author-info">
        <div class="author-name">${escHtml(authorName)}</div>
        <div class="author-meta">
          <span><i class='bx bx-calendar'></i>${fmtDate(art.created_at)}</span>
          <span><i class='bx bx-time'></i>${readTime(art.konten)}</span>
          <span><i class='bx bx-show'></i>${fmtViews(art.views)} kali dibaca</span>
        </div>
      </div>
    </div>

    ${art.cover_url
      ? `<div class="cover-wrap">
           <img src="${escHtml(art.cover_url)}" alt="${escHtml(art.judul)}"
                onerror="this.parentElement.innerHTML='<i class=\\'bx bx-news cover-placeholder\\'></i>'">
         </div>`
      : ''}

    <div class="article-body">${art.konten || '<p>Konten tidak tersedia.</p>'}</div>

    ${tags.length > 1 ? `
      <div class="tags-footer">
        ${tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}
      </div>` : ''}
  `
</script>
</body>
</html>
