<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Konseling - Mahasiswa</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-dark: #000;
            --accent: #8b5cf6;
            --border: rgba(255,255,255,0.08);
            --sidebar-collapsed: 80px;
            --sidebar-expanded: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        .app-layout { display: flex; width: 100%; height: 100vh; }

        /* --- SIDEBAR HOVER SYSTEM --- */
        .sidebar-col {
            width: var(--sidebar-collapsed);
            background: #000;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .sidebar-col:hover { width: var(--sidebar-expanded); }

        .sidebar-col span {
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }
        .sidebar-col:hover span { opacity: 1 !important; visibility: visible !important; }

        .sidebar-col .menu-link {
            display: flex !important;
            align-items: center !important;
            padding: 12px 28px !important;
            width: var(--sidebar-expanded);
            gap: 15px;
        }

        /* --- CONVERSATION LIST --- */
        .conv-list-col {
            width: 300px; flex-shrink: 0; background: #050505;
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .conv-list-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); }
        .conv-list-header h3 { font-size: 1rem; }
        .conv-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--border);
            transition: background 0.15s ease;
        }
        .conv-item:hover { background: rgba(255,255,255,0.04); }
        .conv-item.active { background: rgba(139,92,246,0.12); }
        .conv-avatar {
            width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem;
            flex-shrink: 0;
        }
        .conv-info { overflow: hidden; }
        .conv-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-sub { font-size: 0.72rem; color: #71717a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-empty { padding: 30px 20px; color: #71717a; font-size: 0.8rem; text-align: center; }

        /* --- CHAT AREA --- */
        .chat-window-col { flex: 1; display: flex; flex-direction: column; background: #000; }
        .chat-empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #71717a; gap: 10px; }
        .chat-empty-state i { font-size: 2.5rem; }
        .btn-wa {
            display: flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,0.12); color: #22c55e;
            padding: 7px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            text-decoration: none; transition: background 0.15s ease;
        }
        .btn-wa:hover { background: rgba(34,197,94,0.22); }
        .btn-wa i { font-size: 1rem; }

        .chat-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: #050505;
        }

        .chat-feed { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }

        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; }
        .bubble.in { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 2px; }
        .bubble.out { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }

        .input-area { padding: 15px 30px; border-top: 1px solid var(--border); }
        .input-group {
            background: #111; border: 1px solid var(--border);
            border-radius: 50px; padding: 6px 6px 6px 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .input-group input { flex: 1; background: transparent; border: none; color: #fff; outline: none; padding: 10px 0; }
        .btn-send { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-layout">
        <div class="sidebar-col" id="sidebar-inject"></div>

        <div class="conv-list-col">
            <div class="conv-list-header"><h3>Percakapan</h3></div>
            <div id="convList">
                <div class="conv-empty">Memuat...</div>
            </div>
        </div>

        <div class="chat-window-col" id="chatWindow">
            <div class="chat-empty-state">
                <i class='bx bx-message-rounded-dots'></i>
                <span>Pilih konselor di sebelah kiri untuk mulai chat</span>
            </div>
        </div>
    </div>

    <template id="chatWindowTemplate">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="conv-avatar" id="tplAvatar"></div>
                <div>
                    <h4 style="font-size: 0.9rem; margin-bottom: 2px;" id="tplName"></h4>
                    <span style="font-size: 0.7rem; color: #22c55e;"><i class='bx bxs-circle'></i> Online</span>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
                <a id="tplWaBtn" href="#" target="_blank" rel="noopener" class="btn-wa" style="display:none;">
                    <i class='bx bxl-whatsapp'></i> Chat WA
                </a>
                <button onclick="location.href='dashboard.html'" style="background:transparent; color:#64748b; border:none; cursor:pointer;"><i class='bx bx-dots-vertical-rounded' style="font-size: 1.2rem;"></i></button>
            </div>
        </div>

        <div class="chat-feed" id="chatFeed"></div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="chatMsg" placeholder="Tulis pesan untuk konselor...">
                <button class="btn-send" onclick="sendMsg()"><i class='bx bxs-send'></i></button>
            </div>
        </div>
    </template>

    <script type="module">
        import { supabase } from '../assets/js/supabase-client.js'

        // LOAD SIDEBAR
        fetch('../shared/sidebar.html')
            .then(res => res.text())
            .then(html => {
                const sidebar = document.getElementById('sidebar-inject');
                sidebar.innerHTML = html;
                const active = sidebar.querySelector('a[href="chat-konseling.html"]');
                if (active) active.parentElement.classList.add('active');
            });

        let currentSessionId = null
        let currentChannel = null
        let myUserId = null

        const { data: { user } } = await supabase.auth.getUser()
        if (!user) { location.href = '../auth/login.html'; throw new Error('not logged in') }
        myUserId = user.id

        async function fetchConversations() {
            const { data, error } = await supabase
                .from('booking')
                .select(`
                    id, status,
                    konselor:konselor_id (
                        id, whatsapp,
                        profiles:user_id ( id, nama, email, avatar_url )
                    )
                `)
                .eq('mahasiswa_id', myUserId)
                .eq('status', 'accepted')
                .order('created_at', { ascending: false })

            if (error) {
                document.getElementById('convList').innerHTML = `<div class="conv-empty">Gagal memuat percakapan</div>`
                console.error(error)
                return
            }
            renderConvList(data ?? [])
        }

        function renderConvList(bookings) {
            const list = document.getElementById('convList')
            if (bookings.length === 0) {
                list.innerHTML = `<div class="conv-empty">Belum ada konselor yang menerima booking kamu.</div>`
                return
            }
            list.innerHTML = bookings.map(b => {
                const prof = b.konselor?.profiles
                const name = prof?.nama ?? 'Konselor'
                const wa = b.konselor?.whatsapp ?? ''
                const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase()
                return `
                    <div class="conv-item" data-booking-id="${b.id}" data-name="${name}" data-initials="${initials}" onclick="openConversation('${b.id}', '${name.replace(/'/g, "\\'")}', '${initials}', this, '${wa}')">
                        <div class="conv-avatar">${initials}</div>
                        <div class="conv-info">
                            <div class="conv-name">${name}</div>
                            <div class="conv-sub">Booking diterima</div>
                        </div>
                    </div>`
            }).join('')
        }

        window.openConversation = async function (bookingId, name, initials, el, wa) {
            document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'))
            el?.classList.add('active')

            // cari atau buat chat_session untuk booking ini
            let { data: session, error: sErr } = await supabase
                .from('chat_sessions')
                .select('id')
                .eq('booking_id', bookingId)
                .maybeSingle()

            if (sErr) { console.error(sErr); return }

            if (!session) {
                const { data: newSession, error: cErr } = await supabase
                    .from('chat_sessions')
                    .insert({ booking_id: bookingId })
                    .select('id')
                    .single()
                if (cErr) { console.error(cErr); return }
                session = newSession
            }

            currentSessionId = session.id
            renderChatWindow(name, initials, wa)
            await loadMessages(currentSessionId)
            subscribeToMessages(currentSessionId)
        }

        function renderChatWindow(name, initials, wa) {
            const tpl = document.getElementById('chatWindowTemplate')
            const win = document.getElementById('chatWindow')
            win.innerHTML = ''
            win.appendChild(tpl.content.cloneNode(true))
            document.getElementById('tplName').textContent = name
            document.getElementById('tplAvatar').textContent = initials

            const waBtn = document.getElementById('tplWaBtn')
            if (wa && wa.trim() !== '') {
                const pesan = encodeURIComponent(`Halo Kak ${name}, saya ingin menindaklanjuti sesi konseling kita.`)
                const nomor = wa.replace(/[^0-9]/g, '')
                waBtn.href = `https://wa.me/${nomor}?text=${pesan}`
                waBtn.style.display = 'flex'
            } else {
                waBtn.style.display = 'none'
            }

            document.getElementById('chatMsg').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMsg()
            })
        }

        async function loadMessages(sessionId) {
            const { data, error } = await supabase
                .from('chat_messages')
                .select('id, sender_id, isi, created_at')
                .eq('session_id', sessionId)
                .order('created_at', { ascending: true })

            if (error) { console.error(error); return }
            const feed = document.getElementById('chatFeed')
            feed.innerHTML = (data ?? []).map(renderBubble).join('')
            feed.scrollTop = feed.scrollHeight
        }

        function renderBubble(msg) {
            const cls = msg.sender_id === myUserId ? 'out' : 'in'
            return `<div class="bubble ${cls}">${escapeHtml(msg.isi)}</div>`
        }

        function escapeHtml(str) {
            const div = document.createElement('div')
            div.textContent = str
            return div.innerHTML
        }

        function subscribeToMessages(sessionId) {
            if (currentChannel) supabase.removeChannel(currentChannel)
            currentChannel = supabase
                .channel(`chat_messages_${sessionId}`)
                .on('postgres_changes', {
                    event: 'INSERT', schema: 'public', table: 'chat_messages',
                    filter: `session_id=eq.${sessionId}`
                }, (payload) => {
                    const feed = document.getElementById('chatFeed')
                    if (!feed) return
                    feed.insertAdjacentHTML('beforeend', renderBubble(payload.new))
                    feed.scrollTop = feed.scrollHeight
                })
                .subscribe()
        }

        window.sendMsg = async function () {
            const input = document.getElementById('chatMsg')
            const text = input.value.trim()
            if (text === '' || !currentSessionId) return
            input.value = ''

            const { error } = await supabase
                .from('chat_messages')
                .insert({ session_id: currentSessionId, sender_id: myUserId, isi: text })

            if (error) console.error(error)
            // bubble sendiri akan muncul lewat realtime subscribe di atas
        }

        fetchConversations()
    </script>
</body>
</html>
