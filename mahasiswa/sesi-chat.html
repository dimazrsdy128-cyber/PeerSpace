<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sesi Chat — PeerSpace</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* ── Layout ── */
    .chat-wrapper {
      display: flex;
      height: calc(100vh - 70px);
      overflow: hidden;
      background: var(--bg-primary, #0f0f1a);
    }

    /* ── Sidebar: daftar sesi ── */
    .sessions-panel {
      width: 300px;
      min-width: 300px;
      border-right: 1px solid rgba(139,46,255,.18);
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary, #16162a);
      overflow: hidden;
    }
    .sessions-panel__header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(139,46,255,.12);
    }
    .sessions-panel__header h2 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-primary, #e2e2f0);
      margin: 0 0 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(139,46,255,.2);
      border-radius: 10px;
      padding: 8px 12px 8px 36px;
      color: var(--text-primary, #e2e2f0);
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .search-box input:focus { border-color: #8B2EFF; }
    .search-box i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted, #888);
      font-size: 1rem;
    }
    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sessions-list::-webkit-scrollbar { width: 4px; }
    .sessions-list::-webkit-scrollbar-thumb { background: rgba(139,46,255,.3); border-radius: 4px; }

    /* Skeleton for session items */
    .session-skeleton {
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .skel { background: rgba(255,255,255,.07); border-radius: 6px; animation: shimmer 1.5s infinite; }
    .skel-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
    .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .skel-line { height: 10px; }
    .skel-line.short { width: 55%; }
    @keyframes shimmer {
      0%,100% { opacity: .5; }
      50% { opacity: 1; }
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      cursor: pointer;
      transition: background .15s;
      border-left: 3px solid transparent;
      position: relative;
    }
    .session-item:hover { background: rgba(139,46,255,.08); }
    .session-item.active {
      background: rgba(139,46,255,.15);
      border-left-color: #8B2EFF;
    }
    .session-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover;
      background: rgba(139,46,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .session-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .session-info { flex: 1; min-width: 0; }
    .session-info__name {
      font-size: .9rem; font-weight: 600;
      color: var(--text-primary, #e2e2f0);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-info__preview {
      font-size: .78rem;
      color: var(--text-muted, #888);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .session-meta { text-align: right; flex-shrink: 0; }
    .session-meta__time { font-size: .72rem; color: var(--text-muted, #888); }
    .session-meta__badge {
      display: inline-block;
      background: #8B2EFF; color: #fff;
      font-size: .65rem; font-weight: 700;
      border-radius: 99px; padding: 1px 6px;
      margin-top: 4px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--bg-secondary, #16162a);
      position: absolute; bottom: 10px; left: 48px;
    }
    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #6b7280; }

    /* ── Main chat area ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary, #0f0f1a);
    }

    /* Empty state */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted, #888); gap: 14px;
    }
    .chat-empty i { font-size: 3rem; color: rgba(139,46,255,.4); }
    .chat-empty p { font-size: .95rem; }

    /* Chat header */
    .chat-header {
      padding: 14px 22px;
      border-bottom: 1px solid rgba(139,46,255,.15);
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-secondary, #16162a);
      flex-shrink: 0;
    }
    .chat-header__avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(139,46,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; overflow: hidden; flex-shrink: 0;
    }
    .chat-header__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header__info { flex: 1; }
    .chat-header__name { font-weight: 700; font-size: .95rem; color: var(--text-primary, #e2e2f0); }
    .chat-header__status { font-size: .78rem; color: #22c55e; }
    .chat-header__status.offline { color: #6b7280; }
    .chat-header__actions { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,.06); border: none; border-radius: 8px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted, #888); cursor: pointer; transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: rgba(139,46,255,.2); color: #8B2EFF; }

    /* Status badge */
    .sesi-badge {
      padding: 4px 14px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
      margin-left: auto;
    }
    .sesi-badge.ongoing { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
    .sesi-badge.done { background: rgba(107,114,128,.15); color: #9ca3af; border: 1px solid rgba(107,114,128,.3); }

    /* Messages area */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 24px 22px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(139,46,255,.3); border-radius: 4px; }

    /* Date divider */
    .date-divider {
      text-align: center; position: relative; margin: 8px 0;
    }
    .date-divider span {
      background: var(--bg-primary, #0f0f1a);
      padding: 0 12px; font-size: .72rem;
      color: var(--text-muted, #888); position: relative; z-index: 1;
    }
    .date-divider::before {
      content: '';
      position: absolute; top: 50%; left: 0; right: 0;
      height: 1px; background: rgba(255,255,255,.07);
    }

    /* Bubble */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: rgba(139,46,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; color: #fff; overflow: hidden;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble {
      max-width: 68%; padding: 10px 14px;
      border-radius: 16px; line-height: 1.55;
      font-size: .88rem; word-break: break-word;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: rgba(255,255,255,.07);
      color: var(--text-primary, #e2e2f0);
      border-bottom-left-radius: 4px;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, #8B2EFF, #6d1fd6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: .67rem;
      color: var(--text-muted, #888);
      margin-top: 4px;
      display: block;
    }
    .msg-row.mine .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: none; align-items: center; gap: 8px; padding: 0 22px 8px;
    }
    .typing-indicator.show { display: flex; }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(139,46,255,.7);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .typing-text { font-size: .78rem; color: var(--text-muted, #888); }

    /* Input area */
    .chat-input-area {
      padding: 14px 22px;
      border-top: 1px solid rgba(139,46,255,.15);
      background: var(--bg-secondary, #16162a);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }
    .input-box {
      flex: 1;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(139,46,255,.2);
      border-radius: 14px;
      padding: 10px 16px;
      color: var(--text-primary, #e2e2f0);
      font-size: .9rem;
      outline: none;
      resize: none;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color .2s;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-box:focus { border-color: #8B2EFF; }
    .input-box:disabled { opacity: .5; cursor: not-allowed; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: linear-gradient(135deg, #8B2EFF, #6d1fd6);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity .2s, transform .1s;
      font-size: 1.1rem;
    }
    .send-btn:hover { opacity: .9; }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .char-hint { font-size: .72rem; color: var(--text-muted,#888); margin-top: 6px; text-align: right; }

    /* Sesi selesai overlay */
    .ended-notice {
      background: rgba(107,114,128,.1);
      border: 1px solid rgba(107,114,128,.2);
      border-radius: 10px; padding: 12px 18px;
      text-align: center; font-size: .85rem;
      color: var(--text-muted, #888); margin: 0 22px 14px;
    }

    /* Scroll to bottom button */
    .scroll-btn {
      position: absolute; bottom: 80px; right: 24px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(139,46,255,.8);
      border: none; color: #fff; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      font-size: 1rem; box-shadow: 0 4px 12px rgba(139,46,255,.4);
      transition: opacity .2s;
      z-index: 10;
    }
    .scroll-btn.show { display: flex; }

    /* Toast */
    .toast-container {
      position: fixed; top: 18px; right: 18px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 10px 18px; border-radius: 10px;
      font-size: .85rem; font-weight: 500; color: #fff;
      animation: slideIn .3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .toast.success { background: rgba(34,197,94,.9); }
    .toast.error { background: rgba(239,68,68,.9); }
    .toast.info { background: rgba(139,46,255,.9); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .sessions-panel { display: none; }
      .sessions-panel.show-mobile { display: flex; position: absolute; left: 0; top: 0; height: 100%; z-index: 50; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="layout-container" style="display:flex;">
    <div id="sidebar-container"></div>

    <main style="flex:1; min-width:0; padding:0; display:flex; flex-direction:column;">
      <!-- Toast -->
      <div class="toast-container" id="toastContainer"></div>

      <div class="chat-wrapper" id="chatWrapper">
        <!-- Sessions panel -->
        <aside class="sessions-panel" id="sessionsPanel">
          <div class="sessions-panel__header">
            <h2>Sesi Chat</h2>
            <div class="search-box">
              <i class='bx bx-search'></i>
              <input type="text" id="searchInput" placeholder="Cari konselor..." />
            </div>
          </div>
          <div class="sessions-list" id="sessionsList">
            <!-- Skeleton -->
            <div class="session-skeleton" id="skelLoader">
              <div class="skel skel-avatar"></div>
              <div class="skel-lines"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
            </div>
            <div class="session-skeleton">
              <div class="skel skel-avatar"></div>
              <div class="skel-lines"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
            </div>
            <div class="session-skeleton">
              <div class="skel skel-avatar"></div>
              <div class="skel-lines"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div>
            </div>
          </div>
        </aside>

        <!-- Chat main -->
        <section class="chat-main" id="chatMain">
          <!-- Empty state default -->
          <div class="chat-empty" id="chatEmpty">
            <i class='bx bx-conversation'></i>
            <p>Pilih sesi untuk memulai percakapan</p>
          </div>

          <!-- Chat area (hidden until session selected) -->
          <div id="chatArea" style="display:none; flex:1; display:none; flex-direction:column; overflow:hidden;">
            <!-- Header -->
            <div class="chat-header" id="chatHeader">
              <div class="chat-header__avatar" id="headerAvatar"></div>
              <div class="chat-header__info">
                <div class="chat-header__name" id="headerName">—</div>
                <div class="chat-header__status" id="headerStatus">Memuat...</div>
              </div>
              <span class="sesi-badge ongoing" id="sesiStatusBadge">Berlangsung</span>
            </div>

            <!-- Messages -->
            <div class="messages-area" id="messagesArea"></div>

            <!-- Typing -->
            <div class="typing-indicator" id="typingIndicator">
              <div class="typing-dots"><span></span><span></span><span></span></div>
              <span class="typing-text" id="typingText">Konselor sedang mengetik...</span>
            </div>

            <!-- Scroll btn -->
            <button class="scroll-btn" id="scrollBtn" title="Ke bawah">
              <i class='bx bx-chevron-down'></i>
            </button>

            <!-- Ended notice -->
            <div class="ended-notice" id="endedNotice" style="display:none;">
              <i class='bx bx-lock'></i> Sesi ini telah selesai. Kamu tidak bisa mengirim pesan baru.
            </div>

            <!-- Input -->
            <div class="chat-input-area" id="inputArea">
              <div class="input-row">
                <textarea class="input-box" id="msgInput" rows="1"
                  placeholder="Tulis pesan..." maxlength="2000"></textarea>
                <button class="send-btn" id="sendBtn" title="Kirim">
                  <i class='bx bx-send'></i>
                </button>
              </div>
              <div class="char-hint"><span id="charCount">0</span>/2000</div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from '../assets/js/supabase-client.js'

    // ── Auth Guard ──────────────────────────────────────────
    const { data: { user } } = await supabase.auth.getUser()
    if (!user) { window.location.href = '../auth/login.html'; throw new Error('Unauthorized') }

    // ── Load shared UI ──────────────────────────────────────
    const loadUI = (id, path) =>
      fetch(path).then(r => r.text()).then(html => { document.getElementById(id).innerHTML = html }).catch(() => {})
    loadUI('sidebar-container', '../shared/sidebar.html')
    loadUI('navbar-container', '../shared/navbar.html')

    // ── State ───────────────────────────────────────────────
    let currentSession = null
    let currentProfile = null
    let allSessions = []
    let realtimeChannel = null
    let typingTimer = null
    let isAtBottom = true

    // ── Toast helper ────────────────────────────────────────
    function toast(msg, type = 'info') {
      const c = document.getElementById('toastContainer')
      const t = document.createElement('div')
      t.className = `toast ${type}`
      t.textContent = msg
      c.appendChild(t)
      setTimeout(() => t.remove(), 3500)
    }

    // ── Load current user profile ───────────────────────────
    async function loadProfile() {
      const { data, error } = await supabase
        .from('profiles')
        .select('id, full_name, avatar_url, role')
        .eq('id', user.id)
        .single()
      if (error || !data) { toast('Gagal memuat profil.', 'error'); return }
      currentProfile = data
    }

    // ── Load chat sessions ──────────────────────────────────
    async function loadSessions(query = '') {
      const list = document.getElementById('sessionsList')

      // show skeleton
      list.innerHTML = `
        ${[1,2,3].map(() => `
          <div class="session-skeleton">
            <div class="skel skel-avatar"></div>
            <div class="skel-lines">
              <div class="skel skel-line"></div>
              <div class="skel skel-line short"></div>
            </div>
          </div>`).join('')}`

      const { data, error } = await supabase
        .from('chat_sessions')
        .select(`
          id, status, created_at, updated_at,
          konselor:konselor_id (
            id,
            profiles:profile_id ( full_name, avatar_url )
          ),
          chat_messages ( id, content, created_at, sender_id )
        `)
        .eq('mahasiswa_id', user.id)
        .order('updated_at', { ascending: false })

      if (error) {
        list.innerHTML = `<div style="padding:20px;text-align:center;color:#ef4444;font-size:.85rem;">
          <i class='bx bx-error-circle'></i> Gagal memuat sesi</div>`
        return
      }

      allSessions = data || []
      renderSessionList(query)
    }

    function renderSessionList(query = '') {
      const list = document.getElementById('sessionsList')
      const filtered = allSessions.filter(s => {
        const name = s.konselor?.profiles?.full_name || ''
        return name.toLowerCase().includes(query.toLowerCase())
      })

      if (!filtered.length) {
        list.innerHTML = `<div style="padding:24px;text-align:center;color:#888;font-size:.85rem;">
          <i class='bx bx-comment-x' style="font-size:2rem;display:block;margin-bottom:8px;color:rgba(139,46,255,.3)"></i>
          Tidak ada sesi ditemukan</div>`
        return
      }

      list.innerHTML = filtered.map(s => {
        const profile = s.konselor?.profiles || {}
        const name = profile.full_name || 'Konselor'
        const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase()
        const avatarUrl = profile.avatar_url
        const msgs = (s.chat_messages || []).sort((a,b) => new Date(b.created_at)-new Date(a.created_at))
        const lastMsg = msgs[0]
        const preview = lastMsg ? lastMsg.content.slice(0,40) + (lastMsg.content.length>40?'…':'') : 'Belum ada pesan'
        const timeStr = lastMsg ? formatTime(lastMsg.created_at) : ''
        const isActive = currentSession?.id === s.id
        return `
          <div class="session-item ${isActive?'active':''}" data-id="${s.id}">
            <div class="session-avatar">
              ${avatarUrl ? `<img src="${avatarUrl}" alt="${name}" onerror="this.style.display='none'">` : initials}
            </div>
            <div class="status-dot online"></div>
            <div class="session-info">
              <div class="session-info__name">${escHtml(name)}</div>
              <div class="session-info__preview">${escHtml(preview)}</div>
            </div>
            <div class="session-meta">
              <div class="session-meta__time">${timeStr}</div>
              ${s.status==='ongoing'?'<div class="session-meta__badge">Aktif</div>':''}
            </div>
          </div>`
      }).join('')

      list.querySelectorAll('.session-item').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.id
          const s = allSessions.find(x => x.id === id)
          if (s) openSession(s)
        })
      })
    }

    // ── Open session ────────────────────────────────────────
    async function openSession(session) {
      currentSession = session

      // Update active state
      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === session.id)
      })

      const chatArea = document.getElementById('chatArea')
      const chatEmpty = document.getElementById('chatEmpty')
      chatEmpty.style.display = 'none'
      chatArea.style.display = 'flex'

      // Set header
      const profile = session.konselor?.profiles || {}
      const name = profile.full_name || 'Konselor'
      const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
      const avatarUrl = profile.avatar_url

      const headerAvatar = document.getElementById('headerAvatar')
      headerAvatar.innerHTML = avatarUrl
        ? `<img src="${avatarUrl}" alt="${name}" onerror="this.innerHTML='${initials}'">`
        : initials

      document.getElementById('headerName').textContent = name
      document.getElementById('headerStatus').textContent = 'Online'

      // Session status
      const badge = document.getElementById('sesiStatusBadge')
      const inputArea = document.getElementById('inputArea')
      const endedNotice = document.getElementById('endedNotice')
      const msgInput = document.getElementById('msgInput')
      const sendBtn = document.getElementById('sendBtn')

      if (session.status === 'completed' || session.status === 'done') {
        badge.className = 'sesi-badge done'; badge.textContent = 'Selesai'
        inputArea.style.display = 'none'
        endedNotice.style.display = 'block'
      } else {
        badge.className = 'sesi-badge ongoing'; badge.textContent = 'Berlangsung'
        inputArea.style.display = 'block'
        endedNotice.style.display = 'none'
        msgInput.disabled = false
        sendBtn.disabled = false
      }

      // Load messages
      await loadMessages(session.id)

      // Subscribe realtime
      subscribeRealtime(session.id)
    }

    // ── Load messages ────────────────────────────────────────
    async function loadMessages(sessionId) {
      const area = document.getElementById('messagesArea')
      area.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:14px">
          ${[1,2,3].map(i=>`
            <div class="msg-row ${i%2===0?'mine':''}">
              <div class="skel skel-avatar" style="width:30px;height:30px;border-radius:50%;flex-shrink:0"></div>
              <div class="skel" style="height:40px;border-radius:14px;width:${40+i*15}%"></div>
            </div>`).join('')}
        </div>`

      const { data, error } = await supabase
        .from('chat_messages')
        .select('id, content, sender_id, created_at, is_read')
        .eq('session_id', sessionId)
        .order('created_at', { ascending: true })

      if (error) {
        area.innerHTML = `<div style="text-align:center;color:#ef4444;font-size:.85rem;">
          <i class='bx bx-error-circle'></i> Gagal memuat pesan</div>`
        return
      }

      renderMessages(data || [])
      scrollToBottom(true)

      // Mark as read
      if (data?.length) {
        await supabase.from('chat_messages')
          .update({ is_read: true })
          .eq('session_id', sessionId)
          .eq('sender_id', currentSession.konselor?.id)
          .eq('is_read', false)
      }
    }

    function renderMessages(messages) {
      const area = document.getElementById('messagesArea')
      if (!messages.length) {
        area.innerHTML = `<div style="text-align:center;color:#888;font-size:.85rem;margin-top:40px;">
          <i class='bx bx-chat' style="font-size:2.5rem;display:block;color:rgba(139,46,255,.3);margin-bottom:10px"></i>
          Belum ada pesan. Mulai percakapan!</div>`
        return
      }

      let lastDate = null
      const html = messages.map(msg => {
        const isMine = msg.sender_id === user.id
        const profile = isMine ? currentProfile : (currentSession?.konselor?.profiles || {})
        const name = profile?.full_name || (isMine ? 'Kamu' : 'Konselor')
        const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
        const avatarUrl = profile?.avatar_url

        const msgDate = new Date(msg.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
        let dateDivider = ''
        if (msgDate !== lastDate) {
          lastDate = msgDate
          dateDivider = `<div class="date-divider"><span>${msgDate}</span></div>`
        }

        const timeStr = new Date(msg.created_at).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })

        return `${dateDivider}
          <div class="msg-row ${isMine?'mine':''}" data-id="${msg.id}">
            <div class="msg-avatar">
              ${avatarUrl ? `<img src="${avatarUrl}" alt="${initials}" onerror="this.style.display='none'">` : initials}
            </div>
            <div>
              <div class="msg-bubble">${escHtml(msg.content)}</div>
              <span class="msg-time">${timeStr}${isMine && msg.is_read ? ' · Dibaca' : ''}</span>
            </div>
          </div>`
      }).join('')

      area.innerHTML = html
    }

    // ── Realtime subscription ───────────────────────────────
    function subscribeRealtime(sessionId) {
      if (realtimeChannel) supabase.removeChannel(realtimeChannel)

      realtimeChannel = supabase
        .channel(`chat:${sessionId}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'chat_messages',
          filter: `session_id=eq.${sessionId}`
        }, async (payload) => {
          const msg = payload.new
          appendMessage(msg)
          if (msg.sender_id !== user.id) {
            // Mark read
            await supabase.from('chat_messages').update({ is_read: true }).eq('id', msg.id)
          }
        })
        .on('broadcast', { event: 'typing' }, ({ payload }) => {
          if (payload.user_id !== user.id) showTyping(payload.is_typing, payload.name)
        })
        .subscribe()
    }

    function appendMessage(msg) {
      const area = document.getElementById('messagesArea')
      const isMine = msg.sender_id === user.id
      const profile = isMine ? currentProfile : (currentSession?.konselor?.profiles || {})
      const name = profile?.full_name || (isMine ? 'Kamu' : 'Konselor')
      const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()
      const avatarUrl = profile?.avatar_url
      const timeStr = new Date(msg.created_at).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })

      // Remove empty state if present
      const emptyDiv = area.querySelector('.bx-chat')?.closest('div')
      if (emptyDiv) emptyDiv.remove()

      const row = document.createElement('div')
      row.className = `msg-row ${isMine?'mine':''}`
      row.dataset.id = msg.id
      row.innerHTML = `
        <div class="msg-avatar">
          ${avatarUrl ? `<img src="${avatarUrl}" alt="${initials}" onerror="this.style.display='none'">` : initials}
        </div>
        <div>
          <div class="msg-bubble">${escHtml(msg.content)}</div>
          <span class="msg-time">${timeStr}</span>
        </div>`
      area.appendChild(row)

      if (isAtBottom) scrollToBottom(false)
    }

    // ── Typing indicator ────────────────────────────────────
    function showTyping(isTyping, name = 'Konselor') {
      const indicator = document.getElementById('typingIndicator')
      document.getElementById('typingText').textContent = `${name} sedang mengetik...`
      indicator.classList.toggle('show', isTyping)
    }

    async function broadcastTyping(isTyping) {
      if (!realtimeChannel || !currentSession) return
      await realtimeChannel.send({
        type: 'broadcast',
        event: 'typing',
        payload: { user_id: user.id, name: currentProfile?.full_name || 'Mahasiswa', is_typing: isTyping }
      })
    }

    // ── Send message ────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msgInput')
      const sendBtn = document.getElementById('sendBtn')
      const content = input.value.trim()
      if (!content || !currentSession) return
      if (currentSession.status === 'completed' || currentSession.status === 'done') return

      sendBtn.disabled = true
      sendBtn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i>'

      const { error } = await supabase.from('chat_messages').insert({
        session_id: currentSession.id,
        sender_id: user.id,
        content,
        is_read: false
      })

      sendBtn.disabled = false
      sendBtn.innerHTML = '<i class="bx bx-send"></i>'

      if (error) {
        toast('Gagal mengirim pesan.', 'error')
        return
      }

      input.value = ''
      document.getElementById('charCount').textContent = '0'
      autoResize(input)
      broadcastTyping(false)

      // Update session updated_at
      await supabase.from('chat_sessions')
        .update({ updated_at: new Date().toISOString() })
        .eq('id', currentSession.id)
    }

    // ── Scroll helpers ──────────────────────────────────────
    function scrollToBottom(instant = false) {
      const area = document.getElementById('messagesArea')
      area.scrollTo({ top: area.scrollHeight, behavior: instant ? 'instant' : 'smooth' })
    }

    // ── Textarea auto-resize ────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto'
      el.style.height = Math.min(el.scrollHeight, 130) + 'px'
    }

    // ── Utilities ───────────────────────────────────────────
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }
    function formatTime(dateStr) {
      const d = new Date(dateStr)
      const now = new Date()
      const diff = now - d
      if (diff < 60000) return 'Baru saja'
      if (diff < 3600000) return Math.floor(diff/60000) + ' mnt lalu'
      if (diff < 86400000) return d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })
      return d.toLocaleDateString('id-ID', { day:'numeric', month:'short' })
    }

    // ── Event listeners ─────────────────────────────────────
    const msgInput = document.getElementById('msgInput')
    const sendBtn = document.getElementById('sendBtn')
    const charCount = document.getElementById('charCount')
    const searchInput = document.getElementById('searchInput')
    const scrollBtn = document.getElementById('scrollBtn')
    const messagesArea = document.getElementById('messagesArea')

    msgInput.addEventListener('input', () => {
      autoResize(msgInput)
      charCount.textContent = msgInput.value.length

      clearTimeout(typingTimer)
      broadcastTyping(true)
      typingTimer = setTimeout(() => broadcastTyping(false), 2000)
    })

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage()
      }
    })

    sendBtn.addEventListener('click', sendMessage)

    searchInput.addEventListener('input', () => {
      renderSessionList(searchInput.value)
    })

    messagesArea.addEventListener('scroll', () => {
      const threshold = 100
      isAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < threshold
      scrollBtn.classList.toggle('show', !isAtBottom)
    })

    scrollBtn.addEventListener('click', () => scrollToBottom(false))

    // ── Check URL params for direct open ────────────────────
    async function checkUrlSession() {
      const params = new URLSearchParams(window.location.search)
      const sid = params.get('session_id')
      if (sid) {
        const found = allSessions.find(s => s.id === sid)
        if (found) openSession(found)
      }
    }

    // ── Init ────────────────────────────────────────────────
    await loadProfile()
    await loadSessions()
    await checkUrlSession()
  </script>
</body>
</html>
